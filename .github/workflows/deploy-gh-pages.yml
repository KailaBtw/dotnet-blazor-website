name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish Blazor WASM
        run: dotnet publish -c Release -o ./publish --no-restore

      - name: Verify publish output
        run: |
          echo "Listing publish folder:"
          ls -R ./publish || true

          if [ -f ./publish/wwwroot/index.html ]; then
            echo "✅ Found ./publish/wwwroot/index.html"
          elif [ -f ./publish/index.html ]; then
            echo "✅ Found ./publish/index.html"
          else
            echo "::error::Expected index.html in ./publish/wwwroot or ./publish. See docs/DEPLOY_ON_GH_PAGES.md"
            exit 1
          fi

      - name: Add 404.html for client routing
        run: cp ./publish/wwwroot/index.html ./publish/wwwroot/404.html 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
